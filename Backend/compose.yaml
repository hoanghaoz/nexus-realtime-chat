services:
  nexuschat.api:
    image: nexuschat.api
    build:
      context: .
      dockerfile: src/NexusChat.Api/Dockerfile
      
    environment:
        - ConnectionStrings__DefaultConnection=${DEFAULT_CONNECTION}
        - Jwt_Key=${JWT_KEY}
        - Jwt_Issuer=${JWT_ISSUER}
        - Jwt_Audience=${JWT_AUDIENCE}
        - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
    
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
      



