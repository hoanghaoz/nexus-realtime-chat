services:
  nexuschat.api:
    image: nexuschat.api
    build:
      context: .
      dockerfile: src/NexusChat.Api/Dockerfile
      
    environment:
        - ConnectionStrings__DefaultConnection=${DEFAULT_CONNECTION}
        - Jwt_Key=${JWT_KEY}
        - Jwt_Issuer=${JWT_ISSUER}
        - Jwt_Audience=${JWT_AUDIENCE}
        - Cloudinary_CloudName=${CLOUDINARY_CLOUDNAME}
        - Cloudinary_ApiKey=${CLOUDINARY_APIKEY}
        - Cloudinary_ApiSecret=${CLOUDINARY_APISECRET}
      
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
        
  cache:
    image: redis:8.6.1-alpine
    container_name: data_cache
    ports:
      - "6379:6379"
    networks:
      - backend
    
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
      



